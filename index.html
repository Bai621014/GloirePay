<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendstoc App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-principal: #121214;
            --bg-carte: #1e1e24;
            --vert-whatsapp: #25D366;
            --rouge-action: #e63946;
            --texte-blanc: #ffffff;
            --texte-gris: #a0a0b0;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-principal);
            color: var(--texte-blanc);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--vert-whatsapp);
            margin: 5px 0;
            font-size: 28px;
        }

        .header p {
            color: var(--texte-gris);
            font-size: 13px;
        }

        /* Onglets */
        .navigation-tabs {
            display: flex;
            justify-content: space-between;
            background-color: var(--bg-carte);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--texte-gris);
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background-color: var(--vert-whatsapp);
            color: var(--bg-principal);
        }

        /* Sections */
        .app-section {
            display: none;
            background-color: var(--bg-carte);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .app-section.active {
            display: block;
        }

        /* Formulaires */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--texte-gris);
            font-size: 13px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--bg-principal);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }

        /* Cache l'input moche par défaut */
        input[type="file"] {
            display: none;
        }

        /* Style du bouton de téléchargement photo */
        .custom-file-upload {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px dashed #444;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            color: var(--texte-gris);
            background-color: var(--bg-principal);
            font-weight: bold;
        }

        .btn-principal {
            width: 100%;
            background-color: var(--vert-whatsapp);
            color: var(--bg-principal);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Vitrine */
        .grid-vitrine {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .product-card {
            background-color: var(--bg-principal);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1px solid #222;
            position: relative;
        }

        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }

        .video-box {
            width: 100%;
            height: 220px;
            background-color: #000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--texte-gris);
            margin-bottom: 15px;
        }

        .loader-image {
            position: absolute;
            top: 35%;
            left: 42%;
            color: var(--vert-whatsapp);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VENDSTOC APP 🚀</h1>
            <p>Live Vidéo • Saisie Vocale • Facture Signée</p>
        </div>

        <div class="navigation-tabs">
            <button id="btn-tab-live" class="tab-btn active" onclick="changerOnglet('live')"><i class="fa-solid fa-tv"></i> Direct Live</button>
            <button id="btn-tab-vitrine" class="tab-btn" onclick="changerOnglet('vitrine')"><i class="fa-solid fa-bag-shopping"></i> Vitrine</button>
            <button id="btn-tab-clients" class="tab-btn" onclick="changerOnglet('clients')"><i class="fa-solid fa-phone"></i> Clients</button>
        </div>

        <div id="section-live" class="app-section active">
            <h2>Direct Live</h2>
            <div class="video-box">
                <span>[ Caméra prête pour la diffusion ]</span>
            </div>
            <button class="btn-principal" style="background-color:var(--rouge-action); color:white;">
                <i class="fa-solid fa-microphone"></i> Activer Micro Commerce
            </button>
        </div>

        <div id="section-vitrine" class="app-section">
            <h2>Enregistrer une Marchandise</h2>
            
            <div class="form-group">
                <label for="img-input" class="custom-file-upload">
                    <i class="fa-solid fa-camera fa-lg" style="color: var(--vert-whatsapp);"></i> 
                    <span id="file-label">Ajouter ou Prendre une Photo</span>
                </label>
                <input type="file" id="img-input" accept="image/*" onchange="mettreAJourNomFichier()">
            </div>

            <div class="form-group">
                <input type="text" id="p-nom" placeholder="Nom de l'article (ex: Chaussures)">
            </div>

            <div class="form-group">
                <input type="number" id="p-prix" placeholder="Prix en FCFA">
            </div>

            <button class="btn-principal" onclick="sauvegarderArticle()">Enregistrer l'article</button>

            <h3 style="margin-top:20px; color: #ffb703;"><i class="fa-solid fa-boxes-stacked"></i> Articles Disponibles</h3>
            <div class="grid-vitrine" id="vitrine-container"></div>
        </div>

        <div id="section-clients" class="app-section">
            <h2>Suivi Clients</h2>
            <p>Base de données locale active.</p>
        </div>
    </div>

    <script>
        // Ta configuration Cloudinary vérifiée
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dvoya2e3o/image/upload";
        const UPLOAD_PRESET = "ml_default"; 

        let catalogueArticles = JSON.parse(localStorage.getItem('vendstoc_articles')) || [];

        // Gestion stable du changement d'onglets
        function changerOnglet(cible) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const sec = document.getElementById(`section-${cible}`);
            const btn = document.getElementById(`btn-tab-${cible}`);
            
            if(sec) sec.classList.add('active');
            if(btn) btn.classList.add('active');

            if(cible === 'vitrine') {
                afficherCatalogue();
            }
        }

        // Met à jour le texte du bouton quand une photo est sélectionnée
        function mettreAJourNomFichier() {
            const input = document.getElementById('img-input');
            const label = document.getElementById('file-label');
            if(input.files && input.files[0]) {
                label.innerText = "📸 " + input.files[0].name;
                label.style.borderColor = "var(--vert-whatsapp)";
            }
        }

        // Sauvegarde et envoi vers Cloudinary
        async function sauvegarderArticle() {
            const nomInput = document.getElementById('p-nom');
            const prixInput = document.getElementById('p-prix');
            const fileInput = document.getElementById('img-input');

            const nom = nomInput.value.trim();
            const prix = prixInput.value.trim();

            if (!nom || !prix) {
                alert("Veuillez remplir le nom et le prix.");
                return;
            }

            // Image de secours par défaut si aucune photo n'est prise
            let urlImageFinale = "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"; 
            
            // Affiche un aperçu de chargement (Loader) pendant l'envoi
            const container = document.getElementById('vitrine-container');
            const tempId = "temp-" + Date.now();
            const carteTemp = document.createElement('div');
            carteTemp.className = "product-card";
            carteTemp.id = tempId;
            carteTemp.innerHTML = `
                <div class="loader-image"><i class="fa-solid fa-spinner fa-spin fa-2x"></i></div>
                <div style="width:100%; height:120px; background:#222; border-radius:8px;"></div>
                <h4>${nom}</h4>
                <p style="color:var(--vert-whatsapp); font-weight:bold;">Envoi en cours...</p>
            `;
            container.appendChild(carteTemp);

            // Si l'utilisateur a sélectionné une photo
            if (fileInput.files && fileInput.files[0]) {
                const fichier = fileInput.files[0];
                const formData = new FormData();
                formData.append('file', fichier);
                formData.append('upload_preset', UPLOAD_PRESET);

                try {
                    const reponse = await fetch(CLOUDINARY_URL, {
                        method: 'POST',
                        body: formData
                    });
                    const resultatsCloud = await reponse.json();
                    
                    if (resultatsCloud.secure_url) {
                        urlImageFinale = resultatsCloud.secure_url;
                    }
                } catch (err) {
                    console.error("Erreur Cloudinary : ", err);
                }
            }

            // Supprime l'aperçu temporaire
            const elementTemp = document.getElementById(tempId);
            if(elementTemp) elementTemp.remove();

            // Ajoute le produit au catalogue
            const nouvelArticle = {
                id: Date.now(),
                nom: nom,
                prix: parseInt(prix),
                image: urlImageFinale
            };

            catalogueArticles.push(nouvelArticle);
            localStorage.setItem('vendstoc_articles', JSON.stringify(catalogueArticles));

            // Réinitialise le formulaire
            nomInput.value = "";
            prixInput.value = "";
            fileInput.value = "";
            document.getElementById('file-label').innerText = "Ajouter ou Prendre une Photo";

            afficherCatalogue();
        }

        // Affiche proprement les cartes d'articles
        function afficherCatalogue() {
            const container = document.getElementById('vitrine-container');
            if(!container) return;
            container.innerHTML = "";

            if(catalogueArticles.length === 0) {
                container.innerHTML = `<p style="grid-column: span 2; color:var(--texte-gris); font-size:13px;">Aucun article disponible.</p>`;
                return;
            }

            catalogueArticles.forEach(art => {
                const carte = document.createElement('div');
                carte.className = "product-card";
                carte.innerHTML = `
                    <img src="${art.image}" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400';">
                    <h4 style="margin:8px 0 4px 0; font-size:15px;">${art.nom}</h4>
                    <p style="color:var(--vert-whatsapp); font-weight:bold; margin:0;">${art.prix.toLocaleString()} FCFA</p>
                `;
                container.appendChild(carte);
            });
        }

        window.onload = function() {
            afficherCatalogue();
        };
    </script>
</body>
</html>
